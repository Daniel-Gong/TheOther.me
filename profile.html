<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oria profile link</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Open this profile in the Oria AI app.">
    <meta id="apple-itunes-meta" name="apple-itunes-app" content="app-id=6758279152">
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <meta property="og:title" content="Oria profile">
    <meta property="og:description" content="Open this profile in the Oria AI app.">
    <meta property="og:image" content="https://oria.me/assets/og-image.png">
    <meta property="og:url" content="https://oria.me/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Oria profile">
    <meta name="twitter:description" content="Open this profile in the Oria AI app.">
    <meta name="twitter:image" content="https://oria.me/assets/og-image.png">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="invite-page">
    <main class="invite-card">
        <p>Oria AI</p>
        <h1>Open this profile</h1>
        <p id="status-text">Trying to open Oria AI app...</p>

        <div id="wechat-notice" class="invite-wechat-notice hidden"></div>

        <div id="fallback-actions" class="invite-actions hidden">
            <a id="open-app-btn" class="invite-btn invite-btn-primary" href="#">Open in app</a>
            <button type="button" id="copy-link-btn" class="invite-btn hidden">Copy link</button>
            <a id="testflight-btn" class="invite-btn"
                href="https://apps.apple.com/us/app/oria-ai-evolvable-personal-ai/id6758279152" target="_blank"
                rel="noopener noreferrer">Download on the App Store</a>
            <a id="home-btn" class="invite-btn" href="/">Continue on Website</a>
        </div>

        <p class="invite-hint" id="hint-text">If the app is installed, it should open automatically.</p>
    </main>

    <script src="js/profile.js"></script>
</body>

</html>
