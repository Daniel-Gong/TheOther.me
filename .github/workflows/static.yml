# Deploy static site to GitHub Pages (oria.me)
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build blog
        run: npm run build:blog

      - name: Generate runtime config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ vars.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID: ${{ vars.FIREBASE_MEASUREMENT_ID }}
          FIREBASE_FUNCTIONS_REGION: ${{ vars.FIREBASE_FUNCTIONS_REGION }}
          FIREBASE_FUNCTIONS_BASE_URL: ${{ vars.FIREBASE_FUNCTIONS_BASE_URL }}
          FIREBASE_APP_CHECK_SITE_KEY: ${{ vars.FIREBASE_APP_CHECK_SITE_KEY }}
        run: |
          mkdir -p js/config
          cat > js/config/runtime-config.js <<EOF
          window.__ORIA_RUNTIME__ = {
            firebaseConfig: {
              apiKey: "${FIREBASE_API_KEY}",
              authDomain: "${FIREBASE_AUTH_DOMAIN}",
              projectId: "${FIREBASE_PROJECT_ID}",
              storageBucket: "${FIREBASE_STORAGE_BUCKET}",
              messagingSenderId: "${FIREBASE_MESSAGING_SENDER_ID}",
              appId: "${FIREBASE_APP_ID}",
              measurementId: "${FIREBASE_MEASUREMENT_ID}",
            },
            functionsRegion: "${FIREBASE_FUNCTIONS_REGION:-us-central1}",
            functionsBaseUrl: "${FIREBASE_FUNCTIONS_BASE_URL}",
            appCheckSiteKey: "${FIREBASE_APP_CHECK_SITE_KEY}",
          };
          EOF

      - name: Prepare deployment
        run: |
          mkdir -p _site _site/.well-known
          cp index.html 404.html CNAME robots.txt llms.txt sitemap.xml .nojekyll _site/
          for f in privacy.html terms.html about.html contact.html invite.html slideshow.html; do
            [ -f "$f" ] && cp "$f" _site/
          done
          [ -f _redirects ] && cp _redirects _site/
          for dir in blog assets css js admin; do
            [ -d "$dir" ] && cp -r "$dir" _site/
          done
          [ -f .well-known/apple-app-site-association ] && cp .well-known/apple-app-site-association _site/.well-known/
          [ -f .well-known/microsoft-identity-association.json ] && cp .well-known/microsoft-identity-association.json _site/.well-known/

      - name: Inject Google Analytics
        run: npm run inject:gtag

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
