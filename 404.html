<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <!-- Open Graph for /invite/* when crawlers hit 404 before client runs -->
    <meta property="og:title" content="You are invited to Oria AI">
    <meta property="og:description" content="Open Oria AI with your invite code or continue on web.">
    <meta property="og:image" content="https://oria.me/assets/og-image.png">
    <meta property="og:url" content="https://oria.me/invite">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="You are invited to Oria AI">
    <meta name="twitter:description" content="Open Oria AI with your invite code or continue on web.">
    <meta name="twitter:image" content="https://oria.me/assets/og-image.png">
</head>

<body>
    <script>
        (function () {
            var path = window.location.pathname || "";
            var match = path.match(/^\/invite\/([^/?#]+)/i);
            if (match && match[1]) {
                fetch("/invite.html")
                    .then(function (r) { return r.text(); })
                    .then(function (html) {
                        document.open();
                        document.write(html);
                        document.close();
                    })
                    .catch(function () {
                        var q = new URLSearchParams(window.location.search);
                        q.set("code", match[1]);
                        window.location.replace("/invite.html?" + q.toString());
                    });
                return;
            }
            window.location.replace("/");
        })();
    </script>
</body>

</html>
